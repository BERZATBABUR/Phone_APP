# Telefon Rehberi – real-world deployment
# Run: docker compose up -d
# API: http://localhost:8080  Swagger: http://localhost:8080/swagger
# UI: run Angular separately (npm start with proxy) or build and serve behind same host

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: TelefonRehberApi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=TelefonRehberDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      CORS__Origins: "http://localhost:4200,http://localhost:8080"
    depends_on:
      sql:
        condition: service_healthy
